<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Southern Germany</title>

<style>
body {
  margin: 0;
  font-family: "Montserrat", sans-serif;
  background: #f5f5f5;
}

.layout {
  display:flex;
  flex-direction: column;
}

/* HEADER */
.kopfzeile {
  position: fixed;
  top: 0;
  width: 100%;
  height: 70px;
  background: #CAFF70;
  display: flex;
  align-items: center;
  padding: 0 20px;
  box-sizing: border-box;
  z-index:200;
}

.kopfzeile img {
  width: 70px;
}

.kopfzeile .text {
  display: flex;
  gap: 80px;
  margin-left: auto;
  margin-right: 80px;
}

.kopfzeile .text a {
  text-decoration: none;
  color: black;
  text-transform: uppercase;
  font-weight: 500;
}

.kopfzeile .brand {
  font-weight: 600;
  margin-right: 40px;
  color: black;
  font-family: "Oswald", sans-serif;
  font-weight: 500;
  text-transform: uppercase;
}

/* SCHWARZER STRICH */
.divider {
  position: fixed;
  top: 70px;
  width: 100%;
  height: 6px;
  background: black;
  z-index:99;
}

.story-list {
  width: 80%;
  max-width: 1000px;
  margin: 120px auto 60px auto;
  display: flex;
  flex-direction: column;
  gap: 40px;
}

.story-card {
  display: flex;
  gap: 25px;
  cursor: pointer;
  align-items: center;
}

.story-card img {
  width: 300px;
  height: 200px;
  object-fit: cover;
  flex-shrink: 0;
}

.story-preview h2 {
  margin: 0 0 10px 0;
  text-transform: uppercase;
  font-weight: 500;
}

.genus-row {
  margin-bottom: 30px;
}

.genus-row h2 {
  margin-bottom: 10px;
  font-weight: 500;
}

.species-row {
  display: flex;
  gap: 15px;
  flex-wrap: wrap;
}
  
.species-row img {
  width: calc(20% - 12px); /* max 5 nebeneinander */
  height: 150px;
  object-fit: cover;
}

  
</style>
</head>

<body>

  <div class="layout">

  <div class="kopfzeile">
  <img src="sticker/Profil.PNG">

  <div class="text">
    <span class="brand">rinteln.photography</span>
    <a href="index.html">home</a>
    <a href="story/story_overview.html">storys</a>
    <a href="animals.html">animals</a>
    <a href="about.html">about</a>
  </div>
</div>

<div class="divider"></div>

<div class="story-list">

  <!-- Familie -->
  <h1>Canidae</h1>

  <!-- Gattung -->
  <div class="genus-row">
    <h2>Lycaon</h2>

    <div class="species-row">
      <img src="images/africa25/wilddog4.jpg" alt="Wilddog">
    </div>
  </div>


  <!-- Familie -->
  <h1>Cetacea</h1>

  <!-- Gattung -->
  <div class="genus-row">
    <h2>Balaenoptera</h2>

    <div class="species-row">
      <img src="australia/humpbak.jpg" alt="Humpback whale">
    </div>
  </div>

</div>

<script src="../script.js"></script>
</body>  
</html>
</body>
