<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Album_Australia24</title>

<style>
body {
  margin: 0;
  font-family: "Montserrat", sans-serif;
  background: #f5f5f5;
}

.layout {
  display:flex;
  flex-direction: column;
}

/* HEADER */
.kopfzeile {
  position: fixed;
  top: 0;
  width: 100%;
  height: 70px;
  background: #CAFF70;
  display: flex;
  align-items: center;
  padding: 0 20px;
  box-sizing: border-box;
  z-index:200;
}

.kopfzeile img {
  width: 70px;
}

.kopfzeile .text {
  display: flex;
  gap: 80px;
  margin-left: auto;
  margin-right: 80px;
}

.kopfzeile .text a {
  text-decoration: none;
  color: black;
  text-transform: uppercase;
  font-weight: 500;
}

.kopfzeile .brand {
  font-weight: 600;
  margin-right: 40px;
  color: black;
  font-family: "Oswald", sans-serif;
  font-weight: 500;
  text-transform: uppercase;
}

/* SCHWARZER STRICH */
.divider {
  position: fixed;
  top: 70px;
  width: 100%;
  height: 6px;
  background: black;
  z-index:99;
}
  
/* Container für EIN Bild */
.album-item {
  width: 90%;
  margin: 40px auto;
  padding: 20px;
  background: #ffffff; /* 👉 hier frei änderbar */
  box-sizing: border-box;
}

/* Bild */
.album-item img {
  width: 100%;
  height: auto;
  display: block;
}

/* Text darunter */
.caption {
  margin-top: 10px;
  font-size: 16px;
  text-align: center;
}
</style>
</head>

  
<body>

<div class="layout">

  <div class="kopfzeile">
  <img src="sticker/Profil.PNG">

  <div class="text">
    <span class="brand">rinteln.photography</span>
    <a href="index.html">home</a>
    <a href="story/story_overview.html">storys</a>
    <a href="animals.html">animals</a>
    <a href="countries.html">countries</a>
    <a href="about.html">about</a>
  </div>
</div>

<div class="divider"></div>

<!-- Bild 1 -->
<div class="album-item" style="background:#e8f5e9;">
  <img src="../australia/kokaburra.jpg">
  <div class="caption">Kokaburra is also called "Lachender Hans" because of its characteristic laugh</div>
</div>

<!-- Bild 2 -->
<div class="album-item" style="background:#fff3e0;">
  <img src="../australia/humpback.jpg">
  <div class="caption">Humpback whales travel along the coast every winter</div>
</div>

<!-- Bild 3 -->
<div class="album-item" style="background:#e3f2fd;">
  <img src="../australia/wallaby.jpg">
  <div class="caption">Yardie Creek is one of themost beautiful canyons in Cape Range National Park</div>
</div>
</div>

</body>
</html>
