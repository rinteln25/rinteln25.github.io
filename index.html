<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Nature Photography</title>
<style>
  body { margin:0; font-family:sans-serif; }
  .hero { height: 75vh; display:flex; gap:0px; padding:0px; }
  .hero img { width: 100%; height: auto; object-fit: cover; 
              cursor: pointer; display: block; }
  .hero img:nth-child(1){
    object-position: center;
  }
  .hero img:nth-child(2){
    object-posistion: center;
  }
  .hero img:nth-child(3) {
    object-position: bottom;
  }
  .about { position: fixed; bottom: 0; left:0 ; width: 100%;
          height: 25vh; padding: 20px; background: #6E8B3D; color: #DBDBDB; }
  .logo {postition: fixed; height: auto; bottom: 20px; left: 20px; object-fit:cover;} 
</style>
</head>
  
<body>
<div class="hero">
  <img src="images/story/Wildhund_Wasser.jpg" alt="wilddog at the water" onclick="window.location='story/wildhund_story1.html'">
  <img src="images/story/flughund.jpg" alt="flying fox in Tom Price" onclick="window.location='story/story2.html'">
  <img src="images/story/fuchs.jpg" alt="fox in the snow" onclick="window.location='story/story3.html'">
</div>

<div class="about">
  <h2>About This Website</h2>
  <p> Hello and welcome!
      Lean back, get some tea and enjoy some pictures to connect with our beautiful nature! 
      Click on the images above to read the stories behind them.</p>
</div>

<div class="logo">
  <img src="sticker/Profil.PNG">
</div>

<script src="script.js"></script>
</body>
</html>
