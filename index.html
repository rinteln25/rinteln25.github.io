<!DOCTYPE html>
<html lang="en">

<head>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<title>Nature Photography</title>
  
<style>
body { margin:0; font-family: "Montserrat", sans-serif; }

.layout {
  display:flex;
  flex-direction: column;
}

/* HEADER */
.kopfzeile {
  position: fixed;
  top: 0;
  width: 100%;
  height: 70px;
  background: #CAFF70;
  display: flex;
  align-items: center;
  padding: 0 20px;
  box-sizing: border-box;
}

.kopfzeile img {
  width: 120px;
}

.kopfzeile .text {
  display: flex;
  gap: 40px;
  margin-left: auto;
}

.kopfzeile .text a {
  text-decoration: none;
  color: #FFFFFF;
  font-weight: 500;
}

/* SCHWARZER STRICH */
.divider {
  position: fixed;
  top: 70px;
  width: 100%;
  height: 6px;
  background: black;
}

/* HERO CONTAINER */
.hero-wrapper {
  margin-top: 120px;
  display: flex;
  justify-content: center;
}

.hero {
  width: 80%;
  max-width: 1200px;
  height: 70vh;
  display: flex;
  gap: 10px;
}

.hero img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  cursor: pointer;
}

.hero img:nth-child(2){
  object-position: center;
}
</style>
</head>

<body>
  
<div class="layout">

<div class="kopfzeile">
  <img src="sticker/Profil.PNG">

  <div class="text">
    <a href="index.html">home</a>
    <a href="story.html">storys</a>
    <a href="animals.html">animals</a>
    <a href="countries.html">countries</a>
    <a href="about.html">about</a>
  </div>
</div>

<div class="divider"></div>

<div class="hero-wrapper">
  <div class="hero">
    <img src="images/story/Wildhund_Wasser.jpg" onclick="window.location='story/wildhund_story1.html'">
    <img src="images/story/flughund.jpg" onclick="window.location='story/story2.html'">
    <img src="images/story/fuchs.jpg" onclick="window.location='story/story3.html'">
  </div>
</div>

</div>
  
<script src="script.js"></script>
</body>
</html>
