<!DOCTYPE html>
<html lang="en">

<head>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<title>Nature Photography</title>
  
<style>
body { margin:0; font-family: "Montserrat", sans-serif; }

.layout {
  display:flex;
  flex-direction: column;
}

/* HEADER */
.kopfzeile {
  position: fixed;
  top: 0;
  width: 100%;
  height: 70px;
  background: #CAFF70;
  display: flex;
  align-items: center;
  padding: 0 20px;
  box-sizing: border-box;
  z-index:200;
}

.kopfzeile img {
  width: 70px;
}

.kopfzeile .text {
  display: flex;
  gap: 80px;
  margin-left: auto;
  margin-right: 80px;
}

.kopfzeile .text a {
  text-decoration: none;
  color: black;
  text-transform: uppercase;
  font-weight: 500;
}

.kopfzeile .brand {
  font-weight: 600;
  margin-right: 40px;
  color: black;
  font-family: "Oswald", sans-serif;
  font-weight: 500;
  text-transform: uppercase;
}

/* SCHWARZER STRICH */
.divider {
  position: fixed;
  top: 70px;
  width: 100%;
  height: 6px;
  background: black;
  z-index:99;
}

/* HERO CONTAINER */
.hero-wrapper {
  margin-top: 120px;
  display: flex;
  justify-content: center;
  z-index: 1;
}

.hero {
  width: 70%;
  max-width: 1200px;
  height: 70vh;
  display: flex;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
}

.hero-item {
  flex: 0 0 90%;
  position: relative;
  height: 100%;
  margin: 0 5%;
  scroll-snap-align: center;
}

.hero-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  cursor: pointer;
  display: block;
}

.hero-title {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  padding: 15px;
  background: rgba(0,0,0,0.5);
  color: white;
  font-size: 18px;
  font-weight: 600;
  box-sizing: border-box;
  text-transform: uppercase;
}

.album-section {
  width: 100%;
  max-width: 1200px;
  margin: 60px auto;
  margin-top: 100px;
  display: flex;
  flex-direction: column;
  gap: 30px;
  color: #FFFFFF;
}

/* Wrapper für Cards */
.album-cards-wrapper {
  display: flex;
  gap: 30px;
  justify-content: center; /* zentriert die Cards */
}

.album-card {
  flex: 1;
  position: relative;
  cursor: pointer;
  overflow: hidden;
}

.album-card img {
  width: 100%;
  height: 250px;
  object-fit: cover;
  display: block;
  transition: transform 0.3s ease;
}

.album-card:hover img {
  transform: scale(1.05);
}

.album-title {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  padding: 10px;
  background: rgba(0,0,0,0.5);
  color: black;
  text-align: center;
}
  
.album-title-header {
  text-align: center;
  text-transform: uppercase;
  margin-bottom: 30px;
  font-weight: 500;
  letter-spacing: 2px;
  font-size: 32px;
}
  
</style>
</head>

<body>
  
<div class="layout">

<div class="kopfzeile">
  <img src="sticker/Profil.PNG">

  <div class="text">
    <span class="brand">rinteln.photography</span>
    <a href="index.html">home</a>
    <a href="story/story_overview.html">storys</a>
    <a href="animals.html">animals</a>
    <a href="countries.html">countries</a>
    <a href="about.html">about</a>
  </div>
</div>

<div class="divider"></div>

<div class="hero-wrapper">
  <div class="hero">
    <div class="hero-item">
    <img src="images/story/Wildhund_Wasser.jpg" onclick="window.location='story/wildhund_story1.html'">
    <div class="hero-title">African Wilddogs - skilled hunters of the bush</div>
    </div>
    <div class="hero-item">
      <img src="images/story/flughund.jpg" onclick="window.location='story/story2.html'">
      <div class="hero-title">Flying foxes in Tom Price</div>
    </div>
    <div class="hero-item">
      <img src="images/story/fuchs.jpg" onclick="window.location='story/foxes_winter26.html'">
      <div class="hero-title">A cry of spring</div>
    </div>
   </div>
</div>

  <div class="album-section">
  <div class="album-title-header">Albums</div>
  
<div class="album-cards-wrapper">
  <div class="album-card" onclick="window.location='album/africa25.html'">
    <img id="africa-img">
    <div class="album-title">South Africa 2025</div>
  </div>

  <div class="album-card" onclick="window.location='album/Australia.html'">
    <img id="australia-img">
    <div class="album-title">The West of Australia 2024</div>
  </div>

  <div class="album-card" onclick="window.location='albums/southern_germany.html'">
    <img id="southern_germany-img">
    <div class="album-title">Southern Germany</div>
  </div>

</div>

</div>
  
<script src="script.js"></script>
</body>
</html>
